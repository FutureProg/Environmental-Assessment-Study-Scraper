name: Auto Fix CI Failures

# ⚠️ SECURITY NOTE
# This workflow checks out the PR branch and runs commands against it with
# elevated permissions (contents:write). Only use in repos where everyone
# with write access is fully trusted. Fork PRs are excluded by the
# pull_requests[0] check below.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read
  contents: write
  pull-requests: write
  issues: write
  actions: read

jobs:
  auto-fix:
    if: |
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.pull_requests[0] &&
      !startsWith(github.event.workflow_run.head_branch, 'claude-auto-fix-ci-')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Configure git identity
        run: |
          git config --global user.email "claude[bot]@users.noreply.github.com"
          git config --global user.name "claude[bot]"

      - name: Create fix branch
        id: branch
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          RUN_ID: ${{ github.run_id }}
        run: |
          SAFE_BRANCH=$(printf '%s' "$HEAD_BRANCH" | tr -cd 'a-zA-Z0-9/_.-')
          BRANCH_NAME="claude-auto-fix-ci-${SAFE_BRANCH}-${RUN_ID}"
          git checkout -b "$BRANCH_NAME"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

      - name: Get CI failure details
        id: failure_details
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: ${{ github.event.workflow_run.id }}
            });

            const failedJobs = jobs.data.jobs.filter(j => j.conclusion === 'failure');

            const errorLogs = [];
            for (const job of failedJobs) {
              const logs = await github.rest.actions.downloadJobLogsForWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                job_id: job.id
              });
              errorLogs.push({ jobName: job.name, logs: logs.data });
            }

            return {
              runUrl: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${{ github.event.workflow_run.id }}`,
              failedJobs: failedJobs.map(j => j.name),
              errorLogs
            };

      - name: Fix CI failures with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--allowedTools 'Edit,MultiEdit,Write,Read,Glob,Grep,LS,Bash(git:*),Bash(gh:*),Bash(deno:*)'"
          prompt: |
            The CI workflow failed on this PR. Diagnose and fix the failures.

            Failed CI run: ${{ fromJSON(steps.failure_details.outputs.result).runUrl }}
            Failed jobs: ${{ join(fromJSON(steps.failure_details.outputs.result).failedJobs, ', ') }}
            PR number: ${{ github.event.workflow_run.pull_requests[0].number }}
            Branch to fix: ${{ steps.branch.outputs.branch_name }}
            Base branch: ${{ github.event.workflow_run.head_branch }}
            Repository: ${{ github.repository }}

            Error logs:
            ${{ toJSON(fromJSON(steps.failure_details.outputs.result).errorLogs) }}

            CI runs three steps in order: `deno lint src/ main.ts`, `deno check main.ts`,
            then `deno task test` (= `deno test --allow-read --allow-env`). Tests are
            offline and run against fixtures in src/adapters/fixtures/. Fix only what is
            broken — do not refactor unrelated code. Once fixed, commit the changes and
            open a PR from ${{ steps.branch.outputs.branch_name }} targeting
            ${{ github.event.workflow_run.head_branch }}.
