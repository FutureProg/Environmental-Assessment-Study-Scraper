name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Cache Deno modules
        uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: deno-v2-${{ hashFiles('deno.lock') }}
          restore-keys: deno-v2-

      - name: Lint
        run: deno lint src/ main.ts

      - name: Type check
        run: deno check main.ts

      - name: Test
        run: deno task test
